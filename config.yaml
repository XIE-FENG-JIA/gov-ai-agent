api:
  auth_enabled: true
  api_keys:
    - cc
knowledge_base:
  path: ./kb_data
  contextual_retrieval: false  # 啟用 Contextual Retrieval（匯入時為每個 chunk 加 LLM 生成的上下文摘要前綴）
llm:
  api_key: ${MINIMAX_API_KEY}
  base_url: https://api.minimax.io/v1
  embedding_model: qwen3-embedding
  embedding_provider: ollama
  model: openai/MiniMax-M2.7
  provider: minimax
organizational_memory:
  default_agencies:
    市政府:
      formal_level: standard
      preferred_terms: {}
      signature_format: default
    臺北市政府環境保護局:
      formal_level: formal
      preferred_terms:
        考慮: 酌情考量
        請: 惠請
      signature_format: 局長 XXX
    行政院:
      formal_level: formal
      preferred_terms:
        請: 敬請
      signature_format: 院長 XXX
  enabled: true
  storage_path: ./kb_data/agency_preferences.json
providers:
  gemini:
    api_key: ${GEMINI_API_KEY}
    model: gemini-2.5-pro
  ollama:
    base_url: http://127.0.0.1:11434
    model: llama3.1:8b
  openrouter:
    api_key: ${LLM_API_KEY}
    base_url: https://openrouter.ai/api/v1
    model: ${LLM_MODEL}
  minimax:
    api_key: ${MINIMAX_API_KEY}
    base_url: https://api.minimax.io/v1
    model: openai/MiniMax-M2.7

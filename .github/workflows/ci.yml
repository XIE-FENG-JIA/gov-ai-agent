name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check src/ tests/ api_server.py

      - name: Check fat-file ratchet
        run: python scripts/check_fat_files.py --strict

      - name: Type check with mypy
        run: mypy src/core/config.py src/core/constants.py src/core/models.py --ignore-missing-imports
        continue-on-error: true

      - name: Run tests with coverage
        env:
          LLM_API_KEY: "test-key-for-ci"
          LLM_MODEL: "mock-model"
        run: python -m pytest tests/ -q --tb=short --cov=src --cov-report=term-missing

      - name: Check requirements-lock.txt exists
        run: test -f requirements-lock.txt

  integration:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run integration tests (no external APIs)
        env:
          LLM_API_KEY: "test-key-for-ci"
          LLM_MODEL: "mock-model"
          GOV_AI_RUN_INTEGRATION: "1"
          # GOV_AI_RUN_LIVE_SOURCES is intentionally NOT set here; live-source tests
          # (test_sources_smoke, test_kb_rebuild_quality_gate, test_kb_cli_flow) will
          # skip automatically. Only pure-local integration tests run in CI.
        run: |
          python -m pytest \
            tests/integration/ \
            -v --tb=short \
            --ignore=tests/integration/test_e2e_rewrite.py

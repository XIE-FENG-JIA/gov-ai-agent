# gov-ai 引擎清單 — Single Source of Truth
# 底層邏輯：UI、CLI、auto-engineer 全部從這裡讀。
# 改一處全鏈路同步。
#
# 欄位對齊：
# - id            : 程式內唯一 key（UI value、CLI flag、log key）
# - display_name  : UI 顯示名（給承辦人看）
# - icon          : emoji or short symbol
# - family        : claude / openai / openrouter / google / mistral
# - model_id      : 真實 model 字串（送 LLM API 用）
# - endpoint      : API base URL（含 /v1 等）
# - status        : active / disabled / deprecated
# - quota_source  : 對應哪個成本/quota 計算源
# - pricing_ref   : 對 D:/auto-dev/scripts/model-pricing.json 的 key（若 null 表示走 quota 不計 token）
# - tags          : 給 UI 過濾用（fast / smart / cheap / premium）
# - notes         : 自由註記

_meta:
  version: 1
  updated: "2026-04-26"
  pricing_source: "D:/auto-dev/scripts/model-pricing.json"
  stale_warn_days: 14   # pricing.json 超過 N 天沒更新，前端顯示警告

engines:
